name: ISOFORM_WEIGHTING
description: "Calculate isoform weights based on bulk RNA-seq quantifications by averaging TPM values across samples and computing relative weights per gene"
keywords:
  - isoform
  - weighting
  - bulk
  - quantification
  - tpm
  - transcript
  - gene expression
tools:
  - r-base:
      description: "The R Project for Statistical Computing"
      homepage: "https://www.r-project.org/"
      documentation: "https://www.r-project.org/manuals.html"
      tool_dev_url: "https://svn.r-project.org/R/"
      licence: "GPL-2.0-or-later"
  - r-dplyr:
      description: "A Grammar of Data Manipulation"
      homepage: "https://dplyr.tidyverse.org/"
      documentation: "https://dplyr.tidyverse.org/reference/index.html"
      tool_dev_url: "https://github.com/tidyverse/dplyr"
      licence: "MIT"
  - r-stringr:
      description: "Simple, Consistent Wrappers for Common String Operations"
      homepage: "https://stringr.tidyverse.org/"
      documentation: "https://stringr.tidyverse.org/reference/index.html"
      tool_dev_url: "https://github.com/tidyverse/stringr"
      licence: "MIT"
input:
  - bulk_quants:
      type: directory
      description: "Directory containing bulk quantification files (quant.sf) from tools like Salmon"
      pattern: "*/"
output:
  - weights:
      type: file
      description: "Tab-separated file containing isoform weights per gene"
      pattern: "weights.tsv"
  - versions:
      type: file
      description: "File containing software versions"
      pattern: "versions.yml"
authors:
  - "@Franzx7"
maintainers:
  - "@Franzx7"